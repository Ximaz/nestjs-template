services:
  database:
    image: postgres:16.8-alpine3.20
    container_name: project-database
    shm_size: 128mb
    restart: unless-stopped
    env_file:
      - secrets/database/.env
    ports:
      - "5432:5432"
    volumes:
      - project-database:/var/lib/postgresql/data:rw
    networks:
      - project-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    depends_on:
      - database
    image: project-backend
    build:
      context: .
      dockerfile: ./docker/backend.Dockerfile
      platforms:
        - linux/arm64
        # - linux/amd64
    container_name: project-backend
    ports:
      - "8080:3000"
    env_file:
      - secrets/backend/.env
    networks:
      - project-network

networks:
  project-network:

volumes:
  project-database:
