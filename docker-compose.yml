services:
  database:
    image: postgres:16.8-alpine3.20
    container_name: project-database
    shm_size: 128mb
    restart: unless-stopped
    env_file:
      - secrets/database/.env
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - project-database:/var/lib/postgresql/data:rw
    networks:
      - project-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  cache:
    image: valkey/valkey:8.1.7-alpine3.23
    container_name: project-cache
    restart: unless-stopped
    env_file:
      - secrets/cache/.env
    command: ["sh", "-c", "valkey-server --user \"$$VALKEY_USERNAME\" on \">$$VALKEY_PASSWORD\" \"~*\" \"&*\" \"+@all\" --user default off"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - project-cache:/data:rw
    networks:
      - project-network
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli --user $${VALKEY_USERNAME} -a $${VALKEY_PASSWORD} ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 5

  queue-cache:
    image: valkey/valkey:8.1.7-alpine3.23
    container_name: project-queue-cache
    restart: unless-stopped
    env_file:
      - secrets/queue/.env
    command: ["sh", "-c", "valkey-server --user \"$$VALKEY_USERNAME\" on \">$$VALKEY_PASSWORD\" \"~*\" \"&*\" \"+@all\" --user default off"]
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - project-queue-cache:/data:rw
    networks:
      - project-network
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli --user $${VALKEY_USERNAME} -a $${VALKEY_PASSWORD} ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    depends_on:
      - database
      - cache
      - queue-cache
    image: project-backend
    build:
      context: .
      dockerfile: ./docker/backend.Dockerfile
      platforms:
        - linux/arm64
        # - linux/amd64
    container_name: project-backend
    ports:
      - "8080:3000"
    env_file:
      - secrets/backend/.env
    networks:
      - project-network

networks:
  project-network:

volumes:
  project-database:
  project-cache:
  project-queue-cache: